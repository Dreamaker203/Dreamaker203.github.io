baseURL = "https://dreamaker203.github.io/"
languageCode = "zh-cn"
title = "Dreamaker's Blog"
theme = "PaperMod"
defaultContentLanguage = "zh-cn"
enableRobotsTXT = true
enableGitInfo = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  DateFormat = "2006-01-02"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowToc = true
  env = "production"
  description = "Dreamaker 的个人博客，记录学习、考研、生活"
  keywords = ["Hugo", "博客", "NLP", "考研", "软件工程"]
  author = "Dreamaker"
  ShowRssButtonInSectionTermList = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowWordCount = true

[params.homeInfoParams]
  Title = "欢迎 👋"
  Content = "这里记录学习、考研、生活。"

[params.comments]
  provider = "giscus"

[params.giscus]
  repo = "Dreamaker203/blog-comments"
  repoId = "R_kgDOSI8cEQ"       
  category = "Announcements"
  categoryId = "DIC_kwDOSI8cEc4C7YA8"
  mapping = "pathname"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "top"
  lightTheme = "light"
  darkTheme = "dark"
  lang = "zh-CN"
  crossorigin = "anonymous"

[[menu.main]]
  name = "文章"
  url = "/posts/"
  weight = 1
[[menu.main]]
  name = "归档"
  url = "/archives/"
  weight = 2
[[menu.main]]
  name = "关于"
  url = "/about/"
  weight = 3